apiVersion: v1
kind: Namespace
metadata:
  name: stream-relay
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stream-relay-config
  namespace: stream-relay
data:
  config.json: |
    {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-relay-redis
  namespace: stream-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stream-relay-redis
  template:
    metadata:
      labels:
        app: stream-relay-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          args:
            - "--save"
            - ""
            - "--appendonly"
            - "no"
---
apiVersion: v1
kind: Service
metadata:
  name: stream-relay-redis
  namespace: stream-relay
spec:
  selector:
    app: stream-relay-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: stream-relay
  namespace: stream-relay
spec:
  selector:
    app: stream-relay-server
  ports:
    - name: http
      port: 80
      targetPort: 29999
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-relay-server
  namespace: stream-relay
spec:
  replicas: 3
  selector:
    matchLabels:
      app: stream-relay-server
  template:
    metadata:
      labels:
        app: stream-relay-server
    spec:
      containers:
        - name: server
          image: stream-relay/server:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "29999"
            - name: REDIS_URL
              value: redis://stream-relay-redis.stream-relay.svc.cluster.local:6379
            - name: CONFIG_PATH
              value: /config.json
          ports:
            - containerPort: 29999
          volumeMounts:
            - name: relay-config
              mountPath: /config.json
              subPath: config.json
      volumes:
        - name: relay-config
          configMap:
            name: stream-relay-config

---
apiVersion: v1
kind: Service
metadata:
  name: stream-relay-nodeport
  namespace: stream-relay
spec:
  type: NodePort
  selector:
    app: stream-relay-server
  ports:
    - name: http-node
      port: 29999
      targetPort: 29999
      nodePort: 39999
---
apiVersion: v1
kind: Service
metadata:
  name: example-upstream
  namespace: stream-relay
spec:
  type: ExternalName
  externalName: example-upstream.default.svc.cluster.local
